services:
  db:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: securesub
      POSTGRES_PASSWORD: securesub_password
      POSTGRES_DB: securesub
    volumes:
      - securesub_pgdata:/var/lib/postgresql/data

volumes:
  securesub_pgdata:

